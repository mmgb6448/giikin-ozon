<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄语标签排版 · 换行分隔 · 跨境电商</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }
        body {
            background: #f0f3f8;
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            max-width: 850px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.1);
            padding: 32px 30px;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 650;
            margin-top: 0;
            margin-bottom: 0.4rem;
            color: #0b1e33;
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sub {
            color: #2c3e50;
            margin-bottom: 2rem;
            font-size: 0.98rem;
            border-left: 4px solid #2563eb;
            padding-left: 18px;
            background: #f8fafd;
            border-radius: 0 10px 10px 0;
            line-height: 1.6;
        }
        .sub strong {
            color: #0b2b4a;
            background: #e6edf6;
            padding: 2px 8px;
            border-radius: 24px;
            font-weight: 600;
        }
        .input-area, .output-area {
            margin-bottom: 28px;
        }
        .input-area label, .output-area label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1e2f44;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        textarea {
            width: 100%;
            padding: 16px 18px;
            font-size: 1.1rem;
            border: 2px solid #dde3ed;
            border-radius: 20px;
            background: #ffffff;
            transition: 0.2s;
            outline: none;
            color: #0f263b;
            resize: vertical;
            line-height: 1.6;
            font-family: 'Segoe UI', Roboto, system-ui, monospace;
        }
        textarea:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37,99,235,0.15);
        }
        textarea[readonly] {
            background: #f4f8ff;
            border-color: #b9c9e0;
            color: #13273f;
            cursor: default;
        }
        .button-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 25px 0 20px;
        }
        .action-btn {
            background: white;
            border: 2px solid #d4deec;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            color: #1e2f44;
            cursor: pointer;
            transition: 0.15s;
            flex: 1 0 auto;
            min-width: 150px;
            box-shadow: 0 3px 6px rgba(0,0,0,0.02);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }
        .action-btn:hover {
            background: #f5f9ff;
            border-color: #7b9bcb;
            transform: translateY(-2px);
            box-shadow: 0 8px 14px rgba(0,30,60,0.08);
        }
        .action-btn:active {
            background: #e1e9f5;
            transform: translateY(1px);
            box-shadow: none;
        }
        .action-btn.delete {
            border-color: #fbc5c5;
            background: #fff8f8;
            color: #a11b1b;
        }
        .action-btn.delete:hover {
            background: #ffe3e3;
            border-color: #f77f7f;
        }
        .action-btn.underscore {
            border-color: #fedbaa;
            background: #fff9ec;
            color: #8d5200;
        }
        .action-btn.underscore:hover {
            background: #fff2d4;
            border-color: #fcaa3a;
        }
        .action-btn.hash {
            border-color: #c5e5b4;
            background: #f4ffee;
            color: #2f6b2f;
        }
        .action-btn.hash:hover {
            background: #e4f5d8;
            border-color: #8fcf6b;
        }
        .action-btn.copy {
            border-color: #b8d3f5;
            background: #eef5ff;
            color: #024d8c;
        }
        .action-btn.copy:hover {
            background: #deebff;
            border-color: #5790df;
        }
        .stats {
            font-size: 0.9rem;
            color: #3e5770;
            background: #ecf2fa;
            padding: 8px 18px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 8px;
        }
        .footer-note {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #62748b;
            text-align: center;
            border-top: 1px dashed #b3c6df;
            padding-top: 18px;
        }
        .footer-note code {
            background: #e7ecf3;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #1f3a5f;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>📦 俄语标签排版 · 换行分隔</h1>
    <div class="sub">
        ✏️ 每行一个俄语词语/短语 · 操作基于当前输出框内容（可组合步骤）<br>
        <strong> ①删除超长行(>29字符) ②行内空格→下划线 ③每行前加“ #” ④复制结果</strong>
    </div>

    <!-- 输入区域：多行文本（换行分隔） -->
    <div class="input-area">
        <label for="inputLines">📥 输入俄语词语 (每行一个，换行分隔)</label>
        <textarea id="inputLines" rows="5" placeholder="здравствуйте&#10;мир&#10;тестирование длинное супер слово больше 29 символов проверка&#10;пример использования">здравствуйте
мир
тестирование длинное супер слово больше 29 символов проверка
пример использования</textarea>
    </div>

    <!-- 输出区域：多行只读，展示排版结果 -->
    <div class="output-area">
        <label for="outputLines">✨ 排版结果 (只读，可复制)</label>
        <textarea id="outputLines" rows="5" readonly wrap="soft"></textarea>
    </div>

    <!-- 四个功能按钮 + 计数统计 -->
    <div class="button-grid">
        <button class="action-btn delete" id="btnDelete" title="删除字符数超过29的整行（基于当前结果）">🗑️ 删除 >29字符行</button>
        <button class="action-btn underscore" id="btnUnderscore" title="将每一行内的空格替换为下划线 _">🔽 行内空格 → _</button>
        <button class="action-btn hash" id="btnHash" title="在每一行前面添加「 #」(包括第一行)">#️⃣ 每行前加「 #」</button>
        <button class="action-btn copy" id="btnCopy" title="复制输出框全部内容（多行文本）">📋 复制结果</button>
    </div>

    <!-- 统计信息：行数 / 字符数（仅作参考） -->
    <div class="stats">
        📊 当前输出行数: <span id="lineCount">0</span> &nbsp;&nbsp;|&nbsp;&nbsp; 总字符: <span id="charCount">0</span>
    </div>

    <div class="footer-note">
        <code>⏎ 输入框改动自动重置输出为原始内容 | 每个按钮均操作输出框现有文本</code>
    </div>
</div>

<script>
    (function() {
        const inputEl = document.getElementById('inputLines');
        const outputEl = document.getElementById('outputLines');
        const btnDelete = document.getElementById('btnDelete');
        const btnUnderscore = document.getElementById('btnUnderscore');
        const btnHash = document.getElementById('btnHash');
        const btnCopy = document.getElementById('btnCopy');
        const lineSpan = document.getElementById('lineCount');
        const charSpan = document.getElementById('charCount');

        // ---------- 辅助函数：统计输出框的行数/字符数 ----------
        function updateStats() {
            const text = outputEl.value;
            const lines = text === '' ? [] : text.split(/\r?\n/);
            // 过滤掉空行仅用于统计？需求中保留空行作为实际内容吗？我们保留所有行，包括空行，以便精确反映输出
            // 但统计时显示总行数（包括空行）和总字符数
            lineSpan.textContent = lines.length;
            charSpan.textContent = text.length;
        }

        // ---------- 从输入框同步到输出框（原始内容） ----------
        function syncOutputFromInput() {
            outputEl.value = inputEl.value;
            updateStats();
        }

        // 监听输入框变化
        inputEl.addEventListener('input', syncOutputFromInput);

        // 页面加载时同步一次
        syncOutputFromInput();

        // ---------- 工具函数：将输出框内容按行处理，保留行结构（包括空行策略）----------
        // 注：所有操作基于输出框当前文本。如果一行是空字符串，如何处理？
        // 删除操作时空行通常不应被删除（长度0<29），保留；空格替换时空行不变；添加#时空行变成" #"？逻辑上对空行加前缀变成" #"也算一行。
        // 我们采用常规split(/\r?\n/)保留所有行，包括空行。处理每行时：
        // - 删除: 过滤掉trim后长度>29的行（但保留空行和短行）
        // - 空格替换: 对每行执行 replace(/ /g, '_') （仅替换空格字符，不影响其他空白如制表符，但一般用户只打空格）
        // - 添加#: 每行前加" #"，空行变成" #"。
        // 这样符合直觉。

        // 1. 删除超过29字符的行（基于行的实际字符数，trim后计算，但保留原始行的前后空格？trim后再计算比较合理，删除后保留trim后的行？但需求是“删掉的是字符数超过29字符的短语”，短语本身可能包含前后空格，但通常不计入有效字符，所以我们trim后再判断长度。删除后保留trim后的内容？还是保留原行？为了清晰，我们采用trim后长度判断，如果超过29则丢弃该行，否则保留原始行（因为可能含有缩进，但标签通常无意义）。但为简单，我们删除整行，保留其余行原样。）
        btnDelete.addEventListener('click', function() {
            const raw = outputEl.value;
            const lines = raw.split(/\r?\n/);
            // 过滤：保留 空行 或 trim后长度 <= 29 的行
            const filtered = lines.filter(line => {
                const trimmed = line.trim();
                return trimmed.length <= 29;   // 空行trim后长度为0，保留
            });
            outputEl.value = filtered.join('\n');
            updateStats();
        });

        // 2. 将每一行内的空格(普通空格)替换为下划线
        btnUnderscore.addEventListener('click', function() {
            const raw = outputEl.value;
            const lines = raw.split(/\r?\n/);
            const updated = lines.map(line => line.replace(/ /g, '_'));
            outputEl.value = updated.join('\n');
            updateStats();
        });

        // 3. 在每一行前增加 " #" (注意：包括空行也会变成" #")
        btnHash.addEventListener('click', function() {
            const raw = outputEl.value;
            const lines = raw.split(/\r?\n/);
            // 每一行前面添加" #"，即使空行也添加
            const withHash = lines.map(line => ' #' + line);
            outputEl.value = withHash.join('\n');
            updateStats();
        });

        // 4. 复制按钮：可靠复制（使用现代clipboard + fallback）
        btnCopy.addEventListener('click', function() {
            const textToCopy = outputEl.value;
            if (textToCopy === '') {
                alert('输出为空，没有可复制的内容');
                return;
            }

            // 尝试使用现代clipboard API
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    // 成功提示
                    showCopyFeedback(true);
                }).catch(err => {
                    console.warn('Clipboard API 失败，使用 fallback', err);
                    fallbackCopy(textToCopy);
                });
            } else {
                // 如果不支持clipboard API，直接fallback
                fallbackCopy(textToCopy);
            }
        });

        // 复制降级方案：创建临时textarea
        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            textarea.style.left = '-999px';
            document.body.appendChild(textarea);
            textarea.select();
            textarea.setSelectionRange(0, 99999); // 兼容移动端
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showCopyFeedback(true);
                } else {
                    showCopyFeedback(false);
                }
            } catch (err) {
                console.error('Fallback 复制失败', err);
                showCopyFeedback(false);
            }
            document.body.removeChild(textarea);
        }

        // 复制反馈（临时修改按钮文字）
        function showCopyFeedback(success) {
            const originalText = btnCopy.textContent;
            if (success) {
                btnCopy.textContent = '✅ 已复制!';
            } else {
                btnCopy.textContent = '❌ 复制失败';
            }
            setTimeout(() => {
                btnCopy.textContent = originalText;
            }, 1200);
        }

        // 确保每次操作后更新统计（已在各个按钮中调用 updateStats）
    })();
</script>
</body>
</html>
